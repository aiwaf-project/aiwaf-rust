name: Build, Test, and Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-core:
    name: Core Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run core tests
        run: cargo test -p aiwaf_core

  test-python:
    name: Python Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install -U pip maturin pytest
      - name: Build wheel
        run: maturin build --release --out dist
      - name: Install wheel
        run: python -m pip install dist/*.whl
      - name: Run pytest
        run: pytest -q

  test-wasm:
    name: WASM Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Run wasm tests
        working-directory: crates/aiwaf_wasm
        run: wasm-pack test --node

  build-wasm:
    name: Build wasm package
    runs-on: ubuntu-latest
    needs: [test-wasm]
    steps:
      - uses: actions/checkout@v4
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build wasm
        working-directory: crates/aiwaf_wasm
        run: wasm-pack build --release --target bundler
      - name: Upload wasm package
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: crates/aiwaf_wasm/pkg

  build-wheels:
    name: Build wheels (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    needs: [test-core, test-python]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Clean dist
        shell: bash
        run: rm -rf dist

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_INCREMENTAL: 0
          PYTHON_SYS_EXECUTABLE: ${{ steps.setup-python.outputs.python-path }}
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        with:
          command: build
          args: --release --out dist
          maturin-version: "1.7.4"
          sccache: false
      - name: Install maturin CLI (for retries)
        run: python -m pip install -U maturin
      - name: Rebuild if CRC check fails
        shell: bash
        run: |
          if ! python scripts/wheel_crc_check.py dist/*.whl; then
            echo "CRC failure detected, rebuilding wheels..."
            rm -rf dist target
            maturin build --release --out dist
          fi
          if ! python scripts/wheel_crc_check.py dist/*.whl; then
            echo "CRC still failing after rebuild"
            exit 1
          fi
      - name: Inspect wheels (pre-normalize)
        shell: bash
        run: |
          for whl in dist/*.whl; do
            echo "Inspecting $whl"
            ls -l "$whl"
            sha256sum "$whl"
            python scripts/inspect_zip.py "$whl" || true
            python scripts/wheel_crc_check.py "$whl" || true
          done
      - name: Normalize wheels
        shell: bash
        run: python scripts/normalize_wheel.py dist/*.whl
      - name: Zip integrity check
        shell: bash
        run: |
          for whl in dist/*.whl; do
            echo "Checking $whl"
            ls -l "$whl"
            sha256sum "$whl"
            python -m zipfile -t "$whl"
            python scripts/check_zip_trailing.py "$whl"
            python scripts/wheel_crc_check.py "$whl"
          done
      - name: Verify wheels
        run: |
          python -m pip install -U twine pkginfo
          twine check dist/*

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: dist

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: [test-core, test-python]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clean dist
        shell: bash
        run: rm -rf dist

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Zip integrity check
        shell: bash
        run: |
          shopt -s nullglob
          for zip in dist/*.zip; do
            python -m zipfile -t "$zip"
          done
      - name: Verify sdist
        run: |
          python -m tarfile -t dist/*.tar.gz

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: rust-sdist
          path: dist

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist, test-wasm]
    permissions:
      id-token: write
    environment:
      name: pypi

    steps:
      - uses: actions/checkout@v4
      - name: Clean dist
        shell: bash
        run: rm -rf dist
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: rust-wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: rust-sdist
          path: dist
      - name: Remove attestation files
        shell: bash
        run: rm -f dist/*.publish.attestation
      - name: Inspect wheels (post-download)
        shell: bash
        run: |
          for whl in dist/*.whl; do
            echo "Inspecting $whl"
            ls -l "$whl"
            sha256sum "$whl"
            python scripts/inspect_zip.py "$whl"
            python scripts/wheel_crc_check.py "$whl"
          done
      - name: Normalize wheels
        shell: bash
        run: python scripts/normalize_wheel.py dist/*.whl
      - name: Verify artifacts
        shell: bash
        run: |
          for whl in dist/*.whl; do
            echo "Checking $whl"
            ls -l "$whl"
            sha256sum "$whl"
            python -m zipfile -t "$whl"
            python scripts/check_zip_trailing.py "$whl"
            python scripts/wheel_crc_check.py "$whl"
          done
          python -m pip install -U twine pkginfo
          twine check dist/*.whl
          python -m tarfile -t dist/*.tar.gz

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  npm-publish:
    name: Publish wasm to npm
    runs-on: ubuntu-latest
    needs: [build-wasm, pypi-publish]
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: pkg
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org/
      - name: Publish
        working-directory: pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
