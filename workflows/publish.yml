name: Build and Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          PYTHON_SYS_EXECUTABLE: ${{ steps.setup-python.outputs.python-path }}
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        with:
          command: build
          args: --release --out dist
          sccache: true

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: dist

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: rust-sdist
          path: dist

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    permissions:
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: rust-wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: rust-sdist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  build-wasm:
    name: Build wasm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build wasm
        working-directory: crates/aiwaf_wasm
        run: wasm-pack build --release --target bundler

      - name: Upload wasm package
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: crates/aiwaf_wasm/pkg

  npm-publish:
    name: Publish wasm to npm
    runs-on: ubuntu-latest
    needs: [build-wasm]
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: pkg

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org/

      - name: Publish
        working-directory: pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
